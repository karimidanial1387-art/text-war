<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text War — نسخه حرفه‌ای</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+Arabic:wght@300;400;600;700&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0a0a0f;
    --dark2: #12121a;
    --dark3: #1a1a28;
    --red: #8b1a1a;
    --red-light: #c0392b;
    --text: #d4c5a0;
    --text-dim: #7a6f5a;
    --border: #2a2a3a;
    --green: #2e7d32;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans Arabic', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.08) 0%, transparent 60%);
  }

  .header {
    text-align: center;
    padding: 40px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header h1 {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 4px;
  }
  .header p {
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 6px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 16px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .card-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Noto Sans Arabic', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    border-radius: 2px;
  }
  .btn:hover {
    background: var(--gold);
    color: var(--dark);
  }
  .btn-red {
    border-color: var(--red-light);
    color: var(--red-light);
  }
  .btn-red:hover {
    background: var(--red-light);
    color: white;
  }
  .btn-sm {
    padding: 6px 14px;
    font-size: 12px;
  }
  .btn-block {
    width: 100%;
    text-align: center;
    margin-bottom: 8px;
  }
  .btn-green {
    border-color: var(--green);
    color: #4caf50;
  }
  .btn-green:hover {
    background: #2e7d32;
    color: white;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  @media(max-width: 600px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  .stats-bar {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
  }
  .stat-item { display: flex; align-items: center; gap: 8px; }
  .stat-item .stat-val { color: var(--gold); font-weight: 700; font-size: 16px; }
  .stat-item .stat-label { color: var(--text-dim); font-size: 11px; }

  .menu-btn {
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 20px;
    cursor: pointer;
    border-radius: 4px;
    text-align: center;
    transition: all 0.25s;
  }
  .menu-btn:hover { border-color: var(--gold); color: var(--gold-light); }
  .menu-btn .menu-icon { font-size: 28px; margin-bottom: 8px; }
  .menu-btn .menu-label { font-size: 13px; font-weight: 600; }

  .shop-item, .player-item {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    margin-bottom: 8px;
  }
  .shop-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .item-price { color: var(--gold); font-size: 13px; font-weight: 600; }

  .quantity-input {
    background: var(--dark);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    width: 80px;
    border-radius: 2px;
    text-align: center;
  }

  .back-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--gold); }

  .profile-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .section-title {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 3px;
    margin: 20px 0 12px;
  }

  .admin-login-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.9);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .admin-login-box {
    background: var(--dark2);
    border: 1px solid var(--gold);
    padding: 30px;
    border-radius: 4px;
    width: 300px;
  }
  .admin-login-box input {
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    width: 100%;
    margin: 15px 0;
  }

  select, input {
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>TEXT WAR — حرفه‌ای</h1>
  <p>نسخه با فروش طلا + خرید تعدادی + پنل ادمین</p>
</div>

<div class="container">

  <!-- صفحه شروع -->
  <div class="screen active" id="screen-start">
    <div class="card" style="text-align:center;">
      <div class="card-title">⚔️ انتخاب طرف</div>
      <div class="grid-2">
        <div class="menu-btn" onclick="showContinent()">
          <div class="menu-icon">🌍</div>
          <div class="menu-label">کشور</div>
        </div>
        <div class="menu-btn" onclick="showGroups()">
          <div class="menu-icon">⚔️</div>
          <div class="menu-label">گروهک</div>
        </div>
      </div>
      <button class="btn" style="margin-top:20px;" onclick="showAdminPanel()">👑 ورود ادمین</button>
    </div>
  </div>

  <!-- صفحه انتخاب قاره و کشور (همان قبلی) -->
  <div class="screen" id="screen-continent">
    <button class="back-btn" onclick="showScreen('screen-start')">← برگشت</button>
    <div class="card"><div class="card-title">🌐 انتخاب قاره</div><div id="continent-list"></div></div>
  </div>
  <div class="screen" id="screen-country">
    <button class="back-btn" onclick="showScreen('screen-continent')">← برگشت</button>
    <div class="card"><div class="card-title" id="country-title"></div><div class="grid-3" id="country-list"></div></div>
  </div>
  <div class="screen" id="screen-group">
    <button class="back-btn" onclick="showScreen('screen-start')">← برگشت</button>
    <div class="card"><div class="card-title">⚔️ انتخاب گروهک</div><div class="grid-2" id="group-list"></div></div>
  </div>

  <!-- صفحه اصلی بازی -->
  <div class="screen" id="screen-main">
    <div class="stats-bar">
      <div class="stat-item"><span>🏳️</span><div><div class="stat-val" id="stat-faction">—</div><div class="stat-label">طرف شما</div></div></div>
      <div class="stat-item"><span>₿</span><div><div class="stat-val" id="stat-money">0</div><div class="stat-label">بیت‌کوین</div></div></div>
      <div class="stat-item"><span>🥇</span><div><div class="stat-val" id="stat-gold">0</div><div class="stat-label">طلا</div></div></div>
    </div>
    <div class="grid-2">
      <div class="menu-btn" onclick="showScreen('screen-shop')"><div class="menu-icon">🛒</div><div class="menu-label">فروشگاه</div></div>
      <div class="menu-btn" onclick="showScreen('screen-mines')"><div class="menu-icon">⛏️</div><div class="menu-label">معادن</div></div>
      <div class="menu-btn" onclick="showProfile()"><div class="menu-icon">📊</div><div class="menu-label">پروفایل</div></div>
      <div class="menu-btn" onclick="collectIncome()"><div class="menu-icon">💰</div><div class="menu-label">دریافت درآمد</div></div>
      <div class="menu-btn" onclick="sellGold()"><div class="menu-icon">💱</div><div class="menu-label">فروش طلا</div></div>
    </div>
  </div>

  <!-- فروشگاه با خرید تعدادی -->
  <div class="screen" id="screen-shop">
    <button class="back-btn" onclick="showScreen('screen-main')">← برگشت</button>
    <div class="card">
      <div class="card-title">🛒 فروشگاه نظامی (خرید تعدادی)</div>
      <select id="shop-category" onchange="renderShopItems()"><option value="">انتخاب دسته...</option></select>
      <div id="shop-items"></div>
    </div>
  </div>

  <!-- معادن -->
  <div class="screen" id="screen-mines">
    <button class="back-btn" onclick="showScreen('screen-main')">← برگشت</button>
    <div class="card"><div class="card-title">⛏️ معادن</div><div id="mines-list"></div></div>
  </div>

  <!-- پروفایل -->
  <div class="screen" id="screen-profile">
    <button class="back-btn" onclick="showScreen('screen-main')">← برگشت</button>
    <div class="card"><div class="card-title">📊 پروفایل</div><div id="profile-content"></div></div>
  </div>

</div>

<script>
// ============ داده‌های بازی ============
const CONTINENTS = {
  "اروپا 🌍": ["انگلیس","فرانسه","آلمان","ایتالیا","روسیه","اوکراین"],
  "آمریکا 🌎": ["آمریکا","کانادا","برزیل"],
  "آسیا 🌏": ["ژاپن","کره جنوبی","چین","هند","ایران","ترکیه"],
  "خاورمیانه 🌍": ["مصر","عربستان","امارات","اسرائیل"]
};
const GROUPS = ["واگنر ⚔️","سپاه پاسداران ☪️","القاعده 🏴","طالبان 🏴","حزب‌الله 🟢"];
const MINES = {
  "معدن مس": {price:5000, income:2000, gold:0},
  "معدن آهن": {price:7000, income:3000, gold:0},
  "معدن نقره": {price:10000, income:5000, gold:0},
  "معدن طلا": {price:30000, income:0, gold:20},
  "چاه نفت": {price:10000, income:7000, gold:0}
};
const MILITARY = {
  "سربازها": {"سرباز عادی":100,"تکاور":400,"کماندو":600},
  "تانک‌ها": {"تانک T-72":400,"تانک T-90":500,"تانک آبرامز":1000},
  "هواپیماها": {"جنگنده F-16":300,"جنگنده F-35":400,"هلیکوپتر آپاچی":800},
  "موشک‌ها": {"موشک کروز":500,"موشک بالستیک":550,"موشک قاره‌پیما":600}
};

let player = JSON.parse(localStorage.getItem('wargame_player') || 'null');

function savePlayer() { localStorage.setItem('wargame_player', JSON.stringify(player)); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-mines') renderMines();
  if(id === 'screen-main') updateStats();
}
function notify(msg) {
  let n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  n.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#12121a;border:1px solid #c9a84c;color:#c9a84c;padding:12px 24px;z-index:9999;border-radius:4px;';
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 2500);
}
function updateStats() {
  if(!player) return;
  document.getElementById('stat-faction').textContent = player.faction;
  document.getElementById('stat-money').textContent = player.money.toLocaleString();
  document.getElementById('stat-gold').textContent = player.gold;
}

// ============ ثبت نام ============
function showContinent() {
  let list = document.getElementById('continent-list');
  list.innerHTML = '';
  Object.keys(CONTINENTS).forEach(c => {
    let btn = document.createElement('button');
    btn.className = 'btn btn-block';
    btn.textContent = c;
    btn.onclick = () => showCountries(c);
    list.appendChild(btn);
  });
  showScreen('screen-continent');
}
function showCountries(continent) {
  document.getElementById('country-title').textContent = 'کشورهای ' + continent;
  let list = document.getElementById('country-list');
  list.innerHTML = '';
  CONTINENTS[continent].forEach(c => {
    let btn = document.createElement('button');
    btn.className = 'btn btn-sm';
    btn.textContent = c;
    btn.onclick = () => selectFaction(c, 'country');
    list.appendChild(btn);
  });
  showScreen('screen-country');
}
function showGroups() {
  let list = document.getElementById('group-list');
  list.innerHTML = '';
  GROUPS.forEach(g => {
    let btn = document.createElement('button');
    btn.className = 'btn btn-block';
    btn.textContent = g;
    btn.onclick = () => selectFaction(g, 'group');
    list.appendChild(btn);
  });
  showScreen('screen-group');
}
function selectFaction(faction, type) {
  player = { faction, type, money: 85000, gold: 0, mines: {}, military: {}, lastIncome: 0 };
  savePlayer();
  updateStats();
  notify('✅ ' + faction + ' ثبت شد!');
  showScreen('screen-main');
}

// ============ فروش طلا ============
function sellGold() {
  if(!player || player.gold < 1) { notify("❌ طلا نداری!"); return; }
  let amount = prompt("چند طلا میخوای بفروشی؟ (هر طلا = 10,000 بیت‌کوین)", "1");
  if(!amount || isNaN(amount) || amount < 1) return;
  amount = parseInt(amount);
  if(amount > player.gold) { notify("طلا کافی نداری!"); return; }
  let earn = amount * 10000;
  player.gold -= amount;
  player.money += earn;
  savePlayer();
  updateStats();
  notify(`💰 ${amount} طلا فروخته شد → +${earn.toLocaleString()} بیت‌کوین`);
}

// ============ خرید تعدادی (فروشگاه جدید) ============
function initShop() {
  let sel = document.getElementById('shop-category');
  sel.innerHTML = '<option value="">انتخاب دسته...</option>';
  Object.keys(MILITARY).forEach(cat => {
    let opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    sel.appendChild(opt);
  });
}
function renderShopItems() {
  let cat = document.getElementById('shop-category').value;
  let container = document.getElementById('shop-items');
  if(!cat) { container.innerHTML = ''; return; }
  let items = MILITARY[cat];
  container.innerHTML = '';
  Object.entries(items).forEach(([name, price]) => {
    let owned = player.military[name] || 0;
    let div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `
      <div><strong>${name}</strong><br><small style="color:#7a6f5a;">دارید: ${owned}</small></div>
      <div><span class="item-price">${price.toLocaleString()} ₿</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="number" id="qty-${name}" min="1" value="1" class="quantity-input" style="width:70px;">
        <button class="btn btn-sm" onclick="buyItemQuantity('${name}', ${price})">خرید</button>
      </div>
    `;
    container.appendChild(div);
  });
}
function buyItemQuantity(name, price) {
  let qtyInput = document.getElementById(`qty-${name}`);
  let qty = parseInt(qtyInput.value);
  if(isNaN(qty) || qty < 1) qty = 1;
  let totalCost = price * qty;
  if(player.money < totalCost) { notify("❌ پول کافی نداری!"); return; }
  player.money -= totalCost;
  player.military[name] = (player.military[name] || 0) + qty;
  savePlayer();
  updateStats();
  notify(`✅ ${qty} تا ${name} خریدی! (${totalCost.toLocaleString()} ₿)`);
  renderShopItems();
}

// ============ معادن ============
function renderMines() {
  let list = document.getElementById('mines-list');
  list.innerHTML = '';
  Object.entries(MINES).forEach(([name, data]) => {
    let owned = player.mines[name] || 0;
    let div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `
      <div><strong>${name}</strong><br><small>درآمد: ${data.income > 0 ? data.income + ' ₿' : data.gold + ' طلا'}</small></div>
      <div><span class="item-price">${data.price.toLocaleString()} ₿</span></div>
      <button class="btn btn-sm" onclick="buyMine('${name}')">خرید (${owned})</button>
    `;
    list.appendChild(div);
  });
}
function buyMine(name) {
  let price = MINES[name].price;
  if(player.money < price) { notify("❌ پول کافی نداری!"); return; }
  player.money -= price;
  player.mines[name] = (player.mines[name] || 0) + 1;
  savePlayer();
  updateStats();
  notify("✅ معدن خریداری شد!");
  renderMines();
}
function collectIncome() {
  let now = Date.now();
  if(now - player.lastIncome < 86400000 && player.lastIncome > 0) { notify("هنوز 24 ساعت نگذشته!"); return; }
  let totalMoney = 0, totalGold = 0;
  Object.entries(player.mines).forEach(([name, count]) => {
    totalMoney += MINES[name].income * count;
    totalGold += MINES[name].gold * count;
  });
  if(totalMoney === 0 && totalGold === 0) { notify("معدنی نداری!"); return; }
  player.money += totalMoney;
  player.gold += totalGold;
  player.lastIncome = now;
  savePlayer();
  updateStats();
  notify(`💰 +${totalMoney.toLocaleString()} ₿ , +${totalGold} طلا`);
}

// ============ پروفایل ============
function showProfile() {
  let c = document.getElementById('profile-content');
  let minesHtml = '', milHtml = '';
  Object.entries(player.mines).forEach(([name, count]) => { minesHtml += `<div class="profile-row"><span>${name}</span><span>${count} عدد</span></div>`; });
  Object.entries(player.military).forEach(([name, count]) => { milHtml += `<div class="profile-row"><span>${name}</span><span>${count} عدد</span></div>`; });
  if(!minesHtml) minesHtml = '<div class="profile-row">معدنی ندارید</div>';
  if(!milHtml) milHtml = '<div class="profile-row">تجهیزاتی ندارید</div>';
  c.innerHTML = `
    <div class="profile-row"><span>طرف</span><span>${player.faction}</span></div>
    <div class="profile-row"><span>بیت‌کوین</span><span>${player.money.toLocaleString()} ₿</span></div>
    <div class="profile-row"><span>طلا</span><span>${player.gold} 🥇</span></div>
    <div class="section-title">⛏️ معادن</div>${minesHtml}
    <div class="section-title">🛡️ تجهیزات</div>${milHtml}
    <button class="btn btn-red btn-sm" onclick="resetGame()">شروع مجدد</button>
  `;
  showScreen('screen-profile');
}
function resetGame() { if(confirm("ریست؟")) { localStorage.removeItem('wargame_player'); player=null; showScreen('screen-start'); } }

// ============ پنل ادمین (با قابلیت ویرایش همه چیز) ============
function showAdminPanel() {
  let psw = prompt("رمز ادمین:");
  if(psw !== "admin123") { notify("رمز اشتباه است!"); return; }
  let allPlayers = [];
  for(let i=0; i<localStorage.length; i++) {
    let key = localStorage.key(i);
    if(key === 'wargame_player') {
      let p = JSON.parse(localStorage.getItem(key));
      allPlayers.push({key, ...p});
    }
  }
  if(allPlayers.length === 0) { notify("هیچ بازیکنی وجود ندارد!"); return; }
  let html = `<div class="card"><div class="card-title">👑 پنل ادمین</div>`;
  allPlayers.forEach((p, idx) => {
    let militaryList = Object.entries(p.military || {}).map(([n,c]) => `${n}:${c}`).join(', ');
    let minesList = Object.entries(p.mines || {}).map(([n,c]) => `${n}:${c}`).join(', ');
    html += `
      <div style="border:1px solid var(--border); margin-bottom:20px; padding:15px;">
        <strong>${p.faction}</strong> (${p.type})<br>
        💰 پول: <input type="number" id="money-${idx}" value="${p.money}" style="width:100px;"> &nbsp;
        🥇 طلا: <input type="number" id="gold-${idx}" value="${p.gold}" style="width:80px;"><br>
        <div class="section-title" style="margin-top:10px;">تجهیزات (نام:تعداد)</div>
        <input type="text" id="military-${idx}" value="${militaryList}" style="width:100%; margin-bottom:8px;" placeholder="سرباز عادی:10, تانک T-72:5"><br>
        <div class="section-title">معادن (نام:تعداد)</div>
        <input type="text" id="mines-${idx}" value="${minesList}" style="width:100%; margin-bottom:8px;" placeholder="معدن طلا:2, چاه نفت:1"><br>
        <button class="btn btn-sm btn-green" onclick="saveAdminEdit(${idx}, '${p.key}')">💾 ذخیره تغییرات</button>
        <button class="btn btn-sm btn-red" onclick="deletePlayer('${p.key}')">🗑️ حذف بازیکن</button>
      </div>
    `;
  });
  html += `<button class="btn" onclick="location.reload()">بستن پنل</button></div>`;
  let profileDiv = document.getElementById('profile-content');
  profileDiv.innerHTML = html;
  showScreen('screen-profile');
}
function saveAdminEdit(idx, key) {
  let newMoney = parseInt(document.getElementById(`money-${idx}`).value);
  let newGold = parseInt(document.getElementById(`gold-${idx}`).value);
  let militaryStr = document.getElementById(`military-${idx}`).value;
  let minesStr = document.getElementById(`mines-${idx}`).value;
  let newMilitary = {};
  militaryStr.split(',').forEach(part => {
    let [name, count] = part.split(':');
    if(name && count) newMilitary[name.trim()] = parseInt(count);
  });
  let newMines = {};
  minesStr.split(',').forEach(part => {
    let [name, count] = part.split(':');
    if(name && count) newMines[name.trim()] = parseInt(count);
  });
  let playerData = JSON.parse(localStorage.getItem(key));
  playerData.money = newMoney;
  playerData.gold = newGold;
  playerData.military = newMilitary;
  playerData.mines = newMines;
  localStorage.setItem(key, JSON.stringify(playerData));
  notify("تغییرات ذخیره شد!");
  showAdminPanel();
}
function deletePlayer(key) {
  if(confirm("حذف شود؟")) {
    localStorage.removeItem(key);
    notify("بازیکن حذف شد!");
    showAdminPanel();
  }
}

initShop();
if(player) { updateStats(); showScreen('screen-main'); }
</script>
</body>
</html>
